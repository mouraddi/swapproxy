app = "swapproxy"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3128
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 3128
  processes = ["app"]

  [[services.ports]]
    port = 3128

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
