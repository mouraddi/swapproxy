services:
  - type: web
    name: swaproxy-engine
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: REDIS_URL
        value: redis://127.0.0.1:6379
      - key: PROXY_PORT
        value: "3128"
      - key: WEB_PORT
        value: "8080"
      - key: PROXY_DOMAIN
        value: "swapproxy.fly.dev"
      - key: REQUEST_TIMEOUT_MS
        value: "30000"
      - key: MAX_RETRIES
        value: "3"
      - key: POOL_REFRESH_MS
        value: "60000"
    healthCheckPath: /
    autoDeploy: true
